<title>Cricket Notebook — Season Records</title>
<style>
  :root{
    --paper:#F3EDDF; --card:#FFFDF6; --sunk:#EFE7D5;
    --ink:#211C13; --ink2:#4E4636; --muted:#7C7160; --faint:#B4A88F; --rule:#E4DBC6;
    --orange:#C43D0C; --orange-soft:#F6E2D5; --purple:#6E2C93; --purple-soft:#ECE0F2;
    --gold:#C88A00; --blue:#1849C6; --green:#3E7A46;
    --sans:"Helvetica Neue",-apple-system,system-ui,Arial,sans-serif;
    --serif:Georgia,"Times New Roman",serif;
    --mono:ui-monospace,"SF Mono",Menlo,"Cascadia Mono",monospace;
    --shadow:6px 6px 0 rgba(33,28,19,.13);
    --shadow-sm:4px 4px 0 rgba(33,28,19,.11);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#171310; --card:#221d16; --sunk:#1c1712;
      --ink:#F3EDDF; --ink2:#cfc6b4; --muted:#9c907c; --faint:#6b6151; --rule:#33291f;
      --orange:#ec6a34; --orange-soft:#3a1d10; --purple:#c07de0; --purple-soft:#2a1636;
      --gold:#e0a83a; --blue:#6f92ee; --green:#68ab70;
      --shadow:6px 6px 0 rgba(0,0,0,.4); --shadow-sm:4px 4px 0 rgba(0,0,0,.34);
    }
  }
  :root[data-theme="light"]{
    --paper:#F3EDDF; --card:#FFFDF6; --sunk:#EFE7D5; --ink:#211C13; --ink2:#4E4636;
    --muted:#7C7160; --faint:#B4A88F; --rule:#E4DBC6; --orange:#C43D0C; --orange-soft:#F6E2D5;
    --purple:#6E2C93; --purple-soft:#ECE0F2; --gold:#C88A00; --blue:#1849C6; --green:#3E7A46;
    --shadow:6px 6px 0 rgba(33,28,19,.13); --shadow-sm:4px 4px 0 rgba(33,28,19,.11);
  }
  :root[data-theme="dark"]{
    --paper:#171310; --card:#221d16; --sunk:#1c1712; --ink:#F3EDDF; --ink2:#cfc6b4;
    --muted:#9c907c; --faint:#6b6151; --rule:#33291f; --orange:#ec6a34; --orange-soft:#3a1d10;
    --purple:#c07de0; --purple-soft:#2a1636; --gold:#e0a83a; --blue:#6f92ee; --green:#68ab70;
    --shadow:6px 6px 0 rgba(0,0,0,.4); --shadow-sm:4px 4px 0 rgba(0,0,0,.34);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans);
    background-image:linear-gradient(rgba(124,113,96,.10) 1px,transparent 1px);
    background-size:100% 44px;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .wrap{max-width:1080px; margin:0 auto; padding:0 22px 72px;}
  .mono{font-family:var(--mono); font-variant-numeric:tabular-nums;}

  /* header */
  header{display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
    flex-wrap:wrap; padding:34px 0 20px; border-bottom:3px solid var(--ink);}
  .brand{display:flex; align-items:center; gap:15px;}
  .ball{width:46px; height:46px; border-radius:50%; flex:none; position:relative; overflow:hidden;
    background:radial-gradient(circle at 32% 28%,#e6602a,#a82c07 70%);
    box-shadow:inset -5px -7px 12px rgba(50,8,0,.5);}
  .ball::after{content:""; position:absolute; left:50%; top:-6px; bottom:-6px; width:0;
    border-left:2px dashed rgba(255,246,230,.85); transform:rotate(19deg);}
  h1{margin:0; font-size:34px; font-weight:800; letter-spacing:-.5px; text-transform:uppercase; line-height:1;}
  h1 em{font-family:var(--serif); font-style:italic; font-weight:500; color:var(--orange); text-transform:none; letter-spacing:0;}
  .kick{font-family:var(--mono); font-size:10.5px; letter-spacing:2px; color:var(--muted); margin-top:6px;}
  .toggle{display:inline-flex; border:1.5px solid var(--ink); border-radius:11px; overflow:hidden; background:var(--card);}
  .toggle button{appearance:none; border:none; background:none; cursor:pointer; font-family:var(--sans);
    font-weight:800; font-size:14px; letter-spacing:.5px; color:var(--ink2); padding:10px 20px;}
  .toggle button[aria-pressed="true"]{background:var(--ink); color:var(--paper);}

  .note{font-family:var(--mono); font-size:11.5px; color:var(--muted); margin:18px 0 2px; letter-spacing:.3px;}
  .note b{color:var(--ink);}

  /* record strip */
  .records{display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:14px;}
  .rec{background:var(--card); border:1px solid var(--ink); border-radius:14px; padding:16px 18px; box-shadow:var(--shadow-sm);}
  .rec .lab{font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--muted);}
  .rec .big{font-size:34px; font-weight:800; letter-spacing:-1px; margin:7px 0 2px; line-height:1;}
  .rec .who{font-size:14px; font-weight:700;}
  .rec .sub{font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:3px;}
  .rec.bat .big{color:var(--orange);} .rec.bowl .big{color:var(--purple);} .rec.tot .big{color:var(--gold);}

  /* cap cards */
  .caps{display:flex; flex-direction:column; gap:22px; margin-top:24px;}
  .cap{background:var(--card); border:1px solid var(--ink); border-radius:16px; overflow:hidden; box-shadow:var(--shadow);}
  .cap-hd{display:flex; align-items:center; gap:14px; padding:16px 20px; color:#fff;}
  .cap.orange .cap-hd{background:var(--orange);} .cap.purple .cap-hd{background:var(--purple);}
  .cap-hd svg{flex:none;}
  .cap-hd .t{font-size:20px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; line-height:1;}
  .cap-hd .s{font-family:var(--mono); font-size:11px; letter-spacing:1.5px; opacity:.85; margin-top:3px;}
  .cap-hd .spacer{flex:1;}
  .cap-hd .metric{font-family:var(--serif); font-style:italic; font-size:15px; opacity:.92;}

  .tbl-scroll{overflow-x:auto;}
  table{width:100%; border-collapse:collapse; font-family:var(--mono); font-variant-numeric:tabular-nums; min-width:640px;}
  thead th{font-size:10px; letter-spacing:1.2px; color:var(--muted); text-transform:uppercase; font-weight:600;
    text-align:right; padding:11px 10px; border-bottom:2px solid var(--ink); white-space:nowrap;}
  thead th:first-child,thead th:nth-child(2){text-align:left;}
  tbody td{padding:11px 10px; border-bottom:1px dotted var(--rule); text-align:right; font-size:13px; white-space:nowrap;}
  tbody td:first-child,tbody td:nth-child(2){text-align:left;}
  tbody tr:hover{background:var(--sunk);}
  .pos{color:var(--faint); width:26px; font-size:12px;}
  .pl{font-family:var(--sans); font-weight:700; font-size:13.5px; display:flex; align-items:center; gap:8px; text-transform:uppercase; letter-spacing:.3px;}
  .dot{width:8px; height:8px; border-radius:2px; flex:none;}
  .dot.IND{background:var(--blue);} .dot.AUS{background:var(--gold);}
  .lead td{background:color-mix(in srgb,var(--accent) 12%,transparent);}
  .cap.orange{--accent:var(--orange);} .cap.purple{--accent:var(--purple);}
  .lead .pl{color:var(--accent);}
  .hl{color:var(--ink); font-weight:700;} /* the headline column */
  .muted{color:var(--muted);}
  .crown{font-family:var(--serif); font-style:italic;}

  footer{margin-top:30px; font-family:var(--mono); font-size:11px; color:var(--muted); line-height:1.7;}
  footer b{color:var(--ink);}
  @media (max-width:720px){
    .records{grid-template-columns:1fr;}
    h1{font-size:26px;}
  }
</style>

<div class="wrap">
  <header>
    <div class="brand">
      <div class="ball"></div>
      <div>
        <h1>Season <em>Records</em></h1>

  <div class="note" id="scope"></div>

        </table>
      </div>
    </div>
  </div>

  <footer id="foot"></footer>
</div>

const C = (n) => Number(n).toLocaleString();

function pick(fmt){
  ["T20","ODI"].forEach(f=>document.getElementById("t-"+f).setAttribute("aria-pressed", String(f===fmt)));
  const d = DATA[fmt];
  document.getElementById("scope").innerHTML =

  const r = d.rec;
  document.getElementById("records").innerHTML = `
